<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --gold-dark: #B8903A;
  --gold-deep: #8B6914;
  --bg-0: #000000;
  --bg-3: #151515;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --text-muted: #8a8278;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="col center" style="background: linear-gradient(180deg, #080604 0%, #000000 100%);">
  <p style="font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 10px;">O Ecossistema</p>
  <h2 style="font-size: 28px; font-weight: 800; color: var(--text-primary); text-align: center; margin-bottom: 40px;">Três camadas de <span style="color: var(--gold);">valor</span></h2>

  <!-- Concentric rings diagram -->
  <div style="position: relative; width: 380px; height: 380px;">
    <!-- Outer ring -->
    <div style="position: absolute; top: 0; left: 0; width: 380px; height: 380px; border-radius: 50%; border: 1px solid rgba(212,168,83,0.12); display: flex; align-items: center; justify-content: center;"></div>
    <!-- Outer label top -->
    <p style="position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; white-space: nowrap;">Comunidade Ampliada</p>

    <!-- Middle ring -->
    <div style="position: absolute; top: 65px; left: 65px; width: 250px; height: 250px; border-radius: 50%; border: 1px solid rgba(212,168,83,0.2); background: rgba(212,168,83,0.02);"></div>
    <!-- Middle label -->
    <p style="position: absolute; top: 78px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.15em; white-space: nowrap;">Membros Ativos</p>

    <!-- Inner ring -->
    <div style="position: absolute; top: 130px; left: 130px; width: 120px; height: 120px; border-radius: 50%; border: 1px solid rgba(212,168,83,0.35); background: rgba(212,168,83,0.05);"></div>

    <!-- Center: Core -->
    <div style="position: absolute; top: 155px; left: 155px; width: 70px; height: 70px; text-align: center;">
      <p style="font-size: 11px; font-weight: 800; color: var(--gold); line-height: 1.2;">Inner<br>Circle</p>
    </div>

    <!-- Side labels -->
    <p style="position: absolute; top: 180px; left: -70px; font-size: 10px; color: var(--gold-light); max-width: 80px; line-height: 1.3; text-align: right;">Eventos Exclusivos</p>
    <p style="position: absolute; top: 180px; right: -70px; font-size: 10px; color: var(--gold-light); max-width: 80px; line-height: 1.3;">Matchmaking VIP</p>
    <p style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--gold-light); white-space: nowrap;">Networking Curado</p>
  </div>
</body>
</html>
