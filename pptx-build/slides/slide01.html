<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --gold-dark: #B8903A;
  --bg-0: #000000;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --text-muted: #8a8278;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="row" style="background-image: url(../images/hero-bg.jpeg); background-size: cover; background-position: center;">
  <!-- Dark overlay left-to-right -->
  <div style="position: absolute; top: 0; left: 0; width: 960px; height: 540px; background: linear-gradient(to right, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.65) 50%, rgba(0,0,0,0.3) 100%);"></div>

  <!-- Corner accents -->
  <div style="position: absolute; top: 20px; left: 20px; width: 50px; height: 1px; background: var(--gold); opacity: 0.35;"></div>
  <div style="position: absolute; top: 20px; left: 20px; width: 1px; height: 50px; background: var(--gold); opacity: 0.35;"></div>
  <div style="position: absolute; bottom: 20px; right: 20px; width: 50px; height: 1px; background: var(--gold); opacity: 0.35;"></div>
  <div style="position: absolute; bottom: 20px; right: 20px; width: 1px; height: 50px; background: var(--gold); opacity: 0.35;"></div>

  <!-- Content area -->
  <div class="col" style="position: relative; z-index: 2; padding: 24px 70px; width: 620px; justify-content: center;">
    <!-- Logo -->
    <div style="margin-bottom: 12px;">
      <img src="../images/logo-rede-de-valor-branco-v2.png" style="width: 140px; height: auto;" />
    </div>

    <!-- Badge -->
    <div style="display: inline-block; padding: 5px 16px; border-radius: 999px; border: 1px solid rgba(212,168,83,0.3); background: rgba(212,168,83,0.06); margin-bottom: 12px;">
      <p style="font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin: 0;">Apresentação Comercial 2025</p>
    </div>

    <!-- Headline -->
    <h1 style="font-size: 40px; font-weight: 800; line-height: 1.08; color: var(--text-primary); letter-spacing: -0.02em;">
      Um novo nível de <span style="color: var(--gold);">networking</span><br>para quem joga pra valer.
    </h1>

    <!-- Subtitle -->
    <p style="font-size: 14px; color: var(--text-secondary); margin-top: 14px; max-width: 440px; line-height: 1.6;">
      Conexões estratégicas, eventos exclusivos e uma comunidade que acelera negócios de verdade.
    </p>

    <!-- Powered by TIME -->
    <div class="row" style="margin-top: 20px; gap: 10px; align-items: center;">
      <img src="../images/logo-time-v2.png" style="width: 32px; height: 32px;" />
      <p style="color: var(--text-muted); font-size: 11px; font-weight: 500;">powered by TIME</p>
    </div>
  </div>

  <!-- Bottom gold line -->
  <div style="position: absolute; bottom: 0; left: 0; width: 960px; height: 2px; background: linear-gradient(90deg, var(--gold), var(--gold-dark), transparent);"></div>
</body>
</html>
