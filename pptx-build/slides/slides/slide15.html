<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --gold-dark: #B8903A;
  --bg-0: #000000;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --text-muted: #8a8278;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="col center" style="background-image: url(../images/cta-bg.jpeg); background-size: cover; background-position: center;">
  <!-- Heavy overlay -->
  <div style="position: absolute; top: 0; left: 0; width: 960px; height: 540px; background: rgba(0,0,0,0.85);"></div>

  <!-- Corner accents -->
  <div style="position: absolute; top: 24px; left: 24px; width: 50px; height: 1px; background: var(--gold); opacity: 0.3;"></div>
  <div style="position: absolute; top: 24px; left: 24px; width: 1px; height: 50px; background: var(--gold); opacity: 0.3;"></div>
  <div style="position: absolute; bottom: 60px; right: 24px; width: 50px; height: 1px; background: var(--gold); opacity: 0.3;"></div>
  <div style="position: absolute; bottom: 60px; right: 24px; width: 1px; height: 50px; background: var(--gold); opacity: 0.3;"></div>

  <div class="col center" style="position: relative; z-index: 2; text-align: center; max-width: 580px;">
    <div style="margin-bottom: 16px;">
      <img src="../images/logo-rede-de-valor-branco-v2.png" style="width: 160px; height: auto;" />
    </div>

    <h1 style="font-size: 32px; font-weight: 800; line-height: 1.15; color: var(--text-primary); letter-spacing: -0.01em;">
      O próximo nível do seu negócio<br>começa com a <span style="color: var(--gold);">conexão certa.</span>
    </h1>

    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 14px; line-height: 1.6; max-width: 420px;">
      Garanta sua vaga de fundador. Fale com nosso time.
    </p>

    <div style="margin-top: 20px; padding: 12px 40px; border-radius: 999px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); display: inline-block;">
      <p style="font-size: 13px; font-weight: 700; color: #000000; letter-spacing: 0.05em;">QUERO FAZER PARTE</p>
    </div>

    <div class="row center" style="margin-top: 16px; gap: 8px;">
      <img src="../images/logo-time-v2.png" style="width: 20px; height: 20px;" />
      <p style="color: var(--text-muted); font-size: 10px; font-weight: 500;">powered by TIME</p>
    </div>
  </div>

  <!-- Footer bar -->
  <div style="position: absolute; bottom: 0; left: 0; width: 960px; padding: 14px 0; text-align: center; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
    <p style="font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); opacity: 0.6;">REDE DE VALOR — UM NOVO NÍVEL DE NETWORKING</p>
  </div>
</body>
</html>
