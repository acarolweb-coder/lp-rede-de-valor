<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --gold-dark: #B8903A;
  --bg-0: #000000;
  --bg-3: #151515;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --text-muted: #8a8278;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="col center" style="background: linear-gradient(160deg, #0a0a0a 0%, #000000 50%, rgba(212,168,83,0.03) 100%); padding: 40px 60px 36px;">
  <p style="font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 8px;">O Investimento</p>
  <h2 style="font-size: 26px; font-weight: 800; color: var(--text-primary); text-align: center; margin-bottom: 32px;">Quanto vale o acesso às <span style="color: var(--gold);">conexões certas</span>?</h2>

  <!-- Big numbers row -->
  <div class="row" style="width: 100%; margin-bottom: 28px;">
    <div class="col center" style="width: 30%; text-align: center;">
      <p style="font-size: 60px; font-weight: 800; color: var(--gold); line-height: 1; letter-spacing: -0.03em; text-align: center;">+500</p>
      <p style="font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: center;">Conexões Estratégicas</p>
    </div>
    <div class="col center" style="width: 3%;">
      <div style="width: 1px; height: 80px; background: rgba(212,168,83,0.15);"></div>
    </div>
    <div class="col center" style="width: 30%; text-align: center;">
      <p style="font-size: 56px; font-weight: 800; color: var(--gold); line-height: 1; letter-spacing: -0.03em; text-align: center;">R$2M+</p>
      <p style="font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: center;">Em Negócios Gerados</p>
    </div>
    <div class="col center" style="width: 3%;">
      <div style="width: 1px; height: 80px; background: rgba(212,168,83,0.15);"></div>
    </div>
    <div class="col center" style="width: 30%; text-align: center;">
      <p style="font-size: 64px; font-weight: 800; color: var(--gold); line-height: 1; letter-spacing: -0.03em; text-align: center;">48</p>
      <p style="font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: center;">Eventos Realizados</p>
    </div>
  </div>

  <p style="font-size: 14px; color: var(--text-muted); text-align: center; max-width: 500px; line-height: 1.6;">
    Os números falam por si. Cada membro que entra na Rede de Valor não paga um custo — faz um investimento com retorno real.
  </p>
</body>
</html>
