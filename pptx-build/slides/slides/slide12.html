<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --gold-dark: #B8903A;
  --gold-deep: #8B6914;
  --bg-0: #000000;
  --bg-3: #151515;
  --bg-4: #1a1a1a;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --text-muted: #8a8278;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="col center" style="background: linear-gradient(180deg, #0a0804 0%, #000000 100%);">
  <p style="font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 14px;">Oferta Especial</p>

  <div class="col center" style="background: linear-gradient(145deg, var(--bg-3), var(--bg-4)); border-radius: 18px; padding: 28px 48px; border: 1px solid rgba(212,168,83,0.2); box-shadow: 0 0 60px rgba(212,168,83,0.08), 0 12px 40px rgba(0,0,0,0.5); max-width: 480px; text-align: center;">
    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 2px;">Valor normal</p>
    <p style="font-size: 20px; color: var(--text-muted); text-decoration: line-through; margin-bottom: 10px;">R$ 4.997</p>

    <p style="font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px;">Investimento Fundador</p>

    <p style="font-size: 56px; font-weight: 800; color: var(--gold); line-height: 1; letter-spacing: -0.03em;">R$ 1.997</p>
    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 6px;">por ano · acesso completo</p>

    <div style="width: 50px; height: 1px; background: rgba(212,168,83,0.25); margin: 16px auto;"></div>

    <p style="font-size: 11px; color: var(--text-muted); line-height: 1.7;">
      Todos os eventos · Matchmaking VIP · Mentoria · Grupo exclusivo
    </p>
  </div>

  <p style="font-size: 11px; color: var(--text-muted); margin-top: 16px; opacity: 0.7;">
    Vagas limitadas · Condição exclusiva para fundadores
  </p>
</body>
</html>
