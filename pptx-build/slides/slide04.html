<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --gold-dark: #B8903A;
  --bg-0: #000000;
  --bg-3: #151515;
  --bg-4: #1a1a1a;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --text-muted: #8a8278;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="col" style="background: #000000; padding: 32px 52px;">
  <p style="font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 6px;">As Dores</p>
  <h2 style="font-size: 26px; font-weight: 800; color: var(--text-primary); margin-bottom: 18px;">O que te impede de <span style="color: var(--gold);">crescer</span></h2>

  <!-- Bento Grid 2x2 -->
  <div class="row items-fill-width" style="gap: 12px; flex: 1;">
    <div class="col items-fill-height" style="gap: 12px; flex: 1;">
      <div class="col" style="flex: 1; background: linear-gradient(135deg, var(--bg-3), var(--bg-4)); border-radius: 12px; padding: 20px; border: 1px solid rgba(212,168,83,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.4);">
        <p style="font-size: 24px; margin-bottom: 8px;">🎭</p>
        <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">Eventos Genéricos</p>
        <p style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">Centenas de pessoas, zero conexões reais.</p>
      </div>
      <div class="col" style="flex: 1; background: linear-gradient(135deg, var(--bg-3), var(--bg-4)); border-radius: 12px; padding: 20px; border: 1px solid rgba(212,168,83,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.4);">
        <p style="font-size: 24px; margin-bottom: 8px;">⏳</p>
        <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">Tempo Perdido</p>
        <p style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">Horas investidas sem retorno real.</p>
      </div>
    </div>
    <div class="col items-fill-height" style="gap: 12px; flex: 1;">
      <div class="col" style="flex: 1; background: linear-gradient(135deg, var(--bg-3), var(--bg-4)); border-radius: 12px; padding: 20px; border: 1px solid rgba(212,168,83,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.4);">
        <p style="font-size: 24px; margin-bottom: 8px;">🔇</p>
        <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">Contatos Frios</p>
        <p style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">Trocou cartão, nunca mais responderam.</p>
      </div>
      <div class="col" style="flex: 1; background: linear-gradient(135deg, var(--bg-3), var(--bg-4)); border-radius: 12px; padding: 20px; border: 1px solid rgba(212,168,83,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.4);">
        <p style="font-size: 24px; margin-bottom: 8px;">📉</p>
        <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">Crescimento Travado</p>
        <p style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">Oportunidades passam, negócio estagna.</p>
      </div>
    </div>
  </div>
</body>
</html>
