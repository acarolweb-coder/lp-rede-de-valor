<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
:root {
  --gold: #D4A853;
  --gold-light: #E8C97A;
  --bg-0: #000000;
  --text-primary: #f5f0e8;
  --text-secondary: #9a9185;
  --font-family-display: 'Plus Jakarta Sans', Arial, sans-serif;
  --font-family-content: 'Plus Jakarta Sans', Arial, sans-serif;
  --color-surface: #000000;
  --color-surface-foreground: #f5f0e8;
  --color-primary: #D4A853;
  --color-muted-foreground: #9a9185;
}
</style>
</head>
<body class="col center" style="background: radial-gradient(ellipse at 50% 40%, rgba(212,168,83,0.06) 0%, #000000 70%);">
  <!-- Subtle gold glow circle -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(212,168,83,0.04) 0%, transparent 70%);"></div>

  <!-- Corner accents -->
  <div style="position: absolute; top: 24px; right: 24px; width: 40px; height: 1px; background: var(--gold); opacity: 0.25;"></div>
  <div style="position: absolute; top: 24px; right: 24px; width: 1px; height: 40px; background: var(--gold); opacity: 0.25;"></div>

  <div class="col center" style="position: relative; z-index: 2; max-width: 680px; text-align: center;">
    <p style="font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 24px;">Reflexão</p>

    <h1 style="font-size: 38px; font-weight: 800; line-height: 1.2; color: var(--text-primary); letter-spacing: -0.01em;">
      E se o <span style="color: var(--gold);">networking</span> certo<br>pudesse mudar tudo?
    </h1>

    <p style="font-size: 17px; color: var(--text-secondary); margin-top: 20px; line-height: 1.7; max-width: 500px;">
      Não estamos falando de trocar cartões. Estamos falando de construir pontes que geram negócios reais.
    </p>
  </div>

  <!-- Bottom subtle line -->
  <div style="position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); width: 60px; height: 2px; background: var(--gold); opacity: 0.3; border-radius: 1px;"></div>
</body>
</html>
